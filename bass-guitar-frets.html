<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bass Fret Trainer</title>
  <style>
    :root{
      --bg:#090c12;
      --surface:#111722;
      --surface-2:#161f2d;
      --text:#eef3ff;
      --muted:#aab7ca;
      --line:rgba(255,255,255,.1);
      --teal:#48d6c5;
      --amber:#ffc857;
      --rose:#ff6b7a;
      --wood:#9b6a3b;
      --wood-dark:#5b3822;
    }
    *{box-sizing:border-box}
    html,body{min-height:100%}
    body{
      margin:0;
      background:
        radial-gradient(900px 580px at 15% 8%, rgba(72,214,197,.18), transparent 58%),
        radial-gradient(820px 560px at 86% 2%, rgba(255,200,87,.13), transparent 56%),
        linear-gradient(180deg, #090c12 0%, #0d1119 58%, #080a0f 100%);
      color:var(--text);
      font-family:"Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      padding:16px;
    }
    button{
      font:inherit;
    }
    .app{
      width:min(1280px, 100%);
      margin:0 auto;
      border:1px solid var(--line);
      border-radius:8px;
      overflow:hidden;
      background:linear-gradient(180deg, rgba(17,23,34,.94), rgba(12,16,24,.98));
      box-shadow:0 24px 60px rgba(0,0,0,.42);
    }
    .top-bar{
      display:grid;
      grid-template-columns:auto minmax(0,1fr) auto;
      align-items:center;
      gap:14px;
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      background:rgba(9,12,18,.72);
    }
    .back-button,
    .control-button,
    .note-button{
      border:1px solid rgba(255,255,255,.14);
      color:var(--text);
      background:rgba(255,255,255,.055);
      cursor:pointer;
      transition:transform .14s ease, border-color .14s ease, background .14s ease, box-shadow .14s ease;
    }
    .back-button{
      display:inline-flex;
      align-items:center;
      gap:6px;
      min-height:38px;
      padding:8px 12px;
      border-radius:8px;
      white-space:nowrap;
      font-weight:700;
    }
    .back-button:hover,
    .back-button:focus-visible,
    .control-button:hover,
    .control-button:focus-visible,
    .note-button:hover,
    .note-button:focus-visible{
      outline:none;
      border-color:rgba(72,214,197,.72);
      box-shadow:0 0 0 3px rgba(72,214,197,.16);
    }
    h1{
      margin:0;
      font-size:clamp(20px, 3vw, 34px);
      line-height:1;
      letter-spacing:0;
    }
    .hint{
      margin:6px 0 0;
      color:var(--muted);
      font-size:14px;
      line-height:1.35;
      letter-spacing:0;
    }
    .round-pill{
      min-width:102px;
      text-align:center;
      padding:8px 10px;
      border:1px solid rgba(255,255,255,.12);
      border-radius:8px;
      color:#15201d;
      background:linear-gradient(180deg, var(--amber), #f3ad34);
      font-weight:800;
      white-space:nowrap;
    }
    .trainer{
      display:grid;
      grid-template-columns:minmax(0, 1fr) 290px;
      gap:0;
    }
    .stage{
      padding:18px;
      min-width:0;
    }
    .question-row{
      display:flex;
      flex-wrap:wrap;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }
    .prompt{
      margin:0;
      font-size:16px;
      color:var(--muted);
      line-height:1.35;
    }
    .target-label{
      display:block;
      margin-top:4px;
      color:var(--text);
      font-size:clamp(24px, 4vw, 42px);
      font-weight:850;
      letter-spacing:0;
    }
    .feedback{
      min-height:44px;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      text-align:right;
      color:var(--muted);
      font-weight:750;
      line-height:1.25;
    }
    .feedback.correct{color:var(--teal)}
    .feedback.wrong{color:var(--rose)}
    .fretboard-shell{
      position:relative;
      width:100%;
      overflow-x:auto;
      border:1px solid rgba(255,255,255,.11);
      border-radius:8px;
      background:#11151d;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08), 0 18px 34px rgba(0,0,0,.3);
    }
    .fretboard{
      display:block;
      min-width:920px;
      width:100%;
      height:auto;
    }
    .bass-photo{
      filter:saturate(1.06) contrast(1.04);
    }
    .string-label,
    .fret-label{
      fill:rgba(238,243,255,.72);
      font-size:18px;
      font-weight:800;
      dominant-baseline:middle;
      text-anchor:middle;
    }
    .fret-label{
      font-size:14px;
      fill:rgba(238,243,255,.52);
    }
    .marker-dot{
      fill:rgba(238,243,255,.24);
    }
    .target-ring{
      fill:rgba(72,214,197,.18);
      stroke:var(--teal);
      stroke-width:7;
      filter:drop-shadow(0 0 8px rgba(72,214,197,.95)) drop-shadow(0 0 22px rgba(72,214,197,.65));
    }
    .target-core{
      fill:#eafffb;
      filter:drop-shadow(0 0 8px rgba(72,214,197,.8));
    }
    .open-highlight{
      stroke:var(--teal);
      stroke-width:8;
      stroke-linecap:round;
      opacity:.75;
      filter:drop-shadow(0 0 12px rgba(72,214,197,.85));
    }
    .answers{
      display:grid;
      grid-template-columns:repeat(6, minmax(0, 1fr));
      gap:10px;
      margin-top:14px;
    }
    .note-button{
      min-height:48px;
      border-radius:8px;
      font-weight:850;
      font-size:17px;
    }
    .note-button.correct{
      color:#08201c;
      border-color:rgba(72,214,197,.95);
      background:linear-gradient(180deg, #74f0df, var(--teal));
    }
    .note-button.wrong{
      border-color:rgba(255,107,122,.9);
      background:rgba(255,107,122,.2);
    }
    .note-button:disabled{
      cursor:default;
      opacity:.82;
      transform:none;
    }
    .side-panel{
      border-left:1px solid var(--line);
      background:rgba(6,9,14,.34);
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }
    .stat-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .stat{
      border:1px solid rgba(255,255,255,.1);
      border-radius:8px;
      padding:12px;
      background:rgba(255,255,255,.045);
    }
    .stat span{
      display:block;
      color:var(--muted);
      font-size:12px;
      font-weight:750;
    }
    .stat strong{
      display:block;
      margin-top:4px;
      font-size:26px;
      line-height:1;
    }
    .control-stack{
      display:grid;
      gap:10px;
    }
    .control-button{
      min-height:44px;
      border-radius:8px;
      font-weight:800;
    }
    .control-button.primary{
      color:#08201c;
      border-color:rgba(72,214,197,.88);
      background:linear-gradient(180deg, #7cf5e5, var(--teal));
    }
    .control-button.warn{
      color:#251505;
      border-color:rgba(255,200,87,.9);
      background:linear-gradient(180deg, #ffd97c, var(--amber));
    }
    .answer-key{
      margin:0;
      padding:12px;
      min-height:74px;
      border:1px solid rgba(255,255,255,.1);
      border-radius:8px;
      background:rgba(255,255,255,.04);
      color:var(--muted);
      line-height:1.45;
      font-size:14px;
    }
    .answer-key strong{
      color:var(--text);
    }
    @media (max-width: 880px){
      body{padding:10px}
      .top-bar{
        grid-template-columns:1fr auto;
      }
      .back-button{
        grid-column:1 / 2;
        width:max-content;
      }
      .title-wrap{
        grid-column:1 / -1;
        grid-row:2;
      }
      .round-pill{
        grid-column:2;
        grid-row:1;
      }
      .trainer{
        grid-template-columns:1fr;
      }
      .side-panel{
        border-left:0;
        border-top:1px solid var(--line);
      }
      .answers{
        grid-template-columns:repeat(4, minmax(0, 1fr));
      }
      .feedback{
        justify-content:flex-start;
        text-align:left;
      }
    }
    @media (max-width: 520px){
      .stage,
      .side-panel{
        padding:12px;
      }
      .answers{
        grid-template-columns:repeat(3, minmax(0, 1fr));
      }
      .note-button{
        min-height:44px;
      }
      .stat strong{
        font-size:22px;
      }
    }
  </style>
</head>
<body>
  <div class="app" aria-label="Bass fret note trainer">
    <div class="top-bar">
      <button class="back-button" type="button" data-back-button aria-label="Back">&larr; Back</button>
      <div class="title-wrap">
        <h1>Bass Fret Trainer</h1>
        <p class="hint">Name the highlighted note on a standard E A D G bass.</p>
      </div>
      <div class="round-pill" aria-live="polite" data-round>Round 1</div>
    </div>

    <main class="trainer">
      <section class="stage" aria-label="Bass fretboard practice area">
        <div class="question-row">
          <p class="prompt">
            What note is this?
            <span class="target-label" data-target-label>E string, fret 5</span>
          </p>
          <div class="feedback" aria-live="polite" data-feedback>Choose a note.</div>
        </div>

        <div class="fretboard-shell">
          <svg class="fretboard" viewBox="0 0 1600 721" role="img" aria-labelledby="fretboard-title fretboard-desc" data-fretboard>
            <title id="fretboard-title">Bass guitar fretboard photo</title>
            <desc id="fretboard-desc">A real bass guitar photo with a highlighted practice position.</desc>
          </svg>
        </div>

        <div class="answers" data-answers aria-label="Note choices"></div>
      </section>

      <aside class="side-panel" aria-label="Practice stats and controls">
        <div class="stat-grid">
          <div class="stat">
            <span>Score</span>
            <strong data-score>0</strong>
          </div>
          <div class="stat">
            <span>Streak</span>
            <strong data-streak>0</strong>
          </div>
          <div class="stat">
            <span>Answered</span>
            <strong data-answered>0</strong>
          </div>
          <div class="stat">
            <span>Accuracy</span>
            <strong data-accuracy>0%</strong>
          </div>
        </div>

        <div class="control-stack">
          <button class="control-button primary" type="button" data-action="next">Next</button>
          <button class="control-button warn" type="button" data-action="reveal">Reveal</button>
          <button class="control-button" type="button" data-action="reset">Reset Score</button>
        </div>

        <p class="answer-key" data-answer-key>
          <strong>Tip:</strong> Open strings are shown just before the nut. Fretted notes sit between the two fret wires.
        </p>
      </aside>
    </main>
  </div>

  <script>
    const backButton = document.querySelector('[data-back-button]');
    if (backButton) {
      backButton.addEventListener('click', () => {
        if (window.history.length <= 1) {
          window.location.href = 'index.html';
        } else {
          window.history.back();
        }
      });
    }

    const NOTES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const STRINGS = [
      { name: 'G', note: 7, nut: { x: 1259, y: 113 }, fret20: { x: 458, y: 329 } },
      { name: 'D', note: 2, nut: { x: 1268, y: 134 }, fret20: { x: 463, y: 353 } },
      { name: 'A', note: 9, nut: { x: 1278, y: 155 }, fret20: { x: 468, y: 377 } },
      { name: 'E', note: 4, nut: { x: 1288, y: 176 }, fret20: { x: 473, y: 401 } }
    ];
    const FRET_TOTAL = 20;
    const GEOMETRY = {
      openExtension: 44
    };

    const svg = document.querySelector('[data-fretboard]');
    const answersEl = document.querySelector('[data-answers]');
    const targetLabelEl = document.querySelector('[data-target-label]');
    const feedbackEl = document.querySelector('[data-feedback]');
    const answerKeyEl = document.querySelector('[data-answer-key]');
    const roundEl = document.querySelector('[data-round]');
    const scoreEl = document.querySelector('[data-score]');
    const streakEl = document.querySelector('[data-streak]');
    const answeredEl = document.querySelector('[data-answered]');
    const accuracyEl = document.querySelector('[data-accuracy]');

    const state = {
      target: null,
      round: 1,
      score: 0,
      streak: 0,
      answered: 0,
      locked: false
    };

    function svgEl(tag, attrs = {}) {
      const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
      Object.entries(attrs).forEach(([key, value]) => el.setAttribute(key, value));
      return el;
    }

    function fretRelative(fret) {
      const maxRelative = 1 - Math.pow(2, -FRET_TOTAL / 12);
      return (1 - Math.pow(2, -fret / 12)) / maxRelative;
    }

    function lerp(start, end, amount) {
      return start + (end - start) * amount;
    }

    function pointOnString(string, amount) {
      return {
        x: lerp(string.nut.x, string.fret20.x, amount),
        y: lerp(string.nut.y, string.fret20.y, amount)
      };
    }

    function fretWirePoint(string, fret) {
      return pointOnString(string, fretRelative(fret));
    }

    function targetPoint(string, fret) {
      if (fret === 0) {
        const dx = string.nut.x - string.fret20.x;
        const dy = string.nut.y - string.fret20.y;
        const length = Math.hypot(dx, dy);
        return {
          x: string.nut.x + (dx / length) * GEOMETRY.openExtension,
          y: string.nut.y + (dy / length) * GEOMETRY.openExtension
        };
      }
      const previous = fretWirePoint(string, fret - 1);
      const current = fretWirePoint(string, fret);
      return {
        x: (previous.x + current.x) / 2,
        y: (previous.y + current.y) / 2
      };
    }

    function noteFor(string, fret) {
      return NOTES[(string.note + fret) % NOTES.length];
    }

    function clearSvg() {
      while (svg.firstChild) {
        svg.removeChild(svg.firstChild);
      }
    }

    function renderFretboard() {
      clearSvg();

      const title = svgEl('title', { id: 'fretboard-title' });
      title.textContent = 'Bass guitar fretboard photo';
      const desc = svgEl('desc', { id: 'fretboard-desc' });
      desc.textContent = 'A real bass guitar photo with a highlighted practice position.';
      svg.append(title, desc);

      svg.append(svgEl('image', {
        class: 'bass-photo',
        href: './bass.png',
        x: '0',
        y: '0',
        width: '1600',
        height: '721',
        preserveAspectRatio: 'xMidYMid meet'
      }));

      renderTarget();
    }

    function renderTarget() {
      svg.querySelectorAll('[data-target-marker]').forEach((el) => el.remove());
      if (!state.target) {
        return;
      }

      const target = targetPoint(state.target.string, state.target.fret);

      if (state.target.fret === 0) {
        const nut = state.target.string.nut;
        svg.append(svgEl('line', {
          'data-target-marker': 'true',
          class: 'open-highlight',
          x1: target.x.toFixed(2),
          x2: nut.x.toFixed(2),
          y1: target.y.toFixed(2),
          y2: nut.y.toFixed(2)
        }));
      }

      svg.append(svgEl('circle', {
        'data-target-marker': 'true',
        class: 'target-ring',
        cx: target.x.toFixed(2),
        cy: target.y.toFixed(2),
        r: state.target.fret === 0 ? '26' : '24'
      }));
      svg.append(svgEl('circle', {
        'data-target-marker': 'true',
        class: 'target-core',
        cx: target.x.toFixed(2),
        cy: target.y.toFixed(2),
        r: '8'
      }));
    }

    function renderAnswers() {
      answersEl.innerHTML = '';
      NOTES.forEach((note) => {
        const button = document.createElement('button');
        button.className = 'note-button';
        button.type = 'button';
        button.textContent = note;
        button.dataset.note = note;
        button.addEventListener('click', () => chooseAnswer(note));
        answersEl.appendChild(button);
      });
    }

    function setFeedback(message, type = '') {
      feedbackEl.textContent = message;
      feedbackEl.className = `feedback ${type}`.trim();
    }

    function updateStats() {
      roundEl.textContent = `Round ${state.round}`;
      scoreEl.textContent = String(state.score);
      streakEl.textContent = String(state.streak);
      answeredEl.textContent = String(state.answered);
      accuracyEl.textContent = state.answered ? `${Math.round((state.score / state.answered) * 100)}%` : '0%';
    }

    function updateTargetLabel() {
      const fretText = state.target.fret === 0 ? 'open' : `fret ${state.target.fret}`;
      targetLabelEl.textContent = `${state.target.string.name} string, ${fretText}`;
    }

    function setAnswerButtonsDisabled(disabled) {
      answersEl.querySelectorAll('button').forEach((button) => {
        button.disabled = disabled;
      });
    }

    function clearAnswerButtonState() {
      answersEl.querySelectorAll('button').forEach((button) => {
        button.classList.remove('correct', 'wrong');
        button.disabled = false;
      });
    }

    function nextTarget() {
      const string = STRINGS[Math.floor(Math.random() * STRINGS.length)];
      const fret = Math.floor(Math.random() * (FRET_TOTAL + 1));
      state.target = {
        string,
        fret,
        answer: noteFor(string, fret)
      };
      state.locked = false;
      clearAnswerButtonState();
      updateTargetLabel();
      setFeedback('Choose a note.');
      answerKeyEl.innerHTML = '<strong>Tip:</strong> Open strings are shown just before the nut. Fretted notes sit between the two fret wires.';
      renderTarget();
      updateStats();
    }

    function chooseAnswer(note) {
      if (state.locked || !state.target) {
        return;
      }

      state.locked = true;
      state.answered += 1;
      setAnswerButtonsDisabled(true);

      const selected = answersEl.querySelector(`[data-note="${note}"]`);
      const correct = answersEl.querySelector(`[data-note="${state.target.answer}"]`);
      correct.classList.add('correct');

      if (note === state.target.answer) {
        state.score += 1;
        state.streak += 1;
        setFeedback('Correct.', 'correct');
      } else {
        state.streak = 0;
        selected.classList.add('wrong');
        setFeedback(`Not quite. It is ${state.target.answer}.`, 'wrong');
      }

      answerKeyEl.innerHTML = `<strong>${state.target.string.name} string, ${state.target.fret === 0 ? 'open' : `fret ${state.target.fret}`}:</strong> ${state.target.answer}`;
      updateStats();
    }

    function revealAnswer() {
      if (!state.target) {
        return;
      }
      state.locked = true;
      setAnswerButtonsDisabled(true);
      const correct = answersEl.querySelector(`[data-note="${state.target.answer}"]`);
      correct.classList.add('correct');
      setFeedback(`Answer: ${state.target.answer}`, 'correct');
      answerKeyEl.innerHTML = `<strong>${state.target.string.name} string, ${state.target.fret === 0 ? 'open' : `fret ${state.target.fret}`}:</strong> ${state.target.answer}`;
    }

    function advanceRound() {
      state.round += 1;
      nextTarget();
    }

    function resetScore() {
      state.score = 0;
      state.streak = 0;
      state.answered = 0;
      state.round = 1;
      nextTarget();
    }

    document.querySelector('[data-action="next"]').addEventListener('click', advanceRound);
    document.querySelector('[data-action="reveal"]').addEventListener('click', revealAnswer);
    document.querySelector('[data-action="reset"]').addEventListener('click', resetScore);

    renderAnswers();
    renderFretboard();
    nextTarget();
  </script>
  <script src="site-navigation.js"></script>
</body>
</html>
