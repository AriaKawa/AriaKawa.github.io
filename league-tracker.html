<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LoL Champion Checklist</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #22c55e;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1rem 1.5rem;
      background: rgba(15, 23, 42, 0.8);
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .controls-row {
      align-items: flex-end;
    }
    h1 {
      font-size: 1.25rem;
      margin: 0;
    }
    .title-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    #controls {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }
    button,
    .pill-button {
      background: #334155;
      border: none;
      color: var(--text);
      padding: 0.4rem 0.8rem;
      border-radius: 9999px;
      cursor: pointer;
      font-size: 0.85rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }
    button:hover,
    .pill-button:hover {
      background: #475569;
    }
    #sortCompleted.active {
      background: var(--accent);
      color: #0f172a;
    }
    #status {
      font-size: 0.8rem;
      color: var(--muted);
    }
    #account-controls {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    #account-controls label {
      font-size: 0.85rem;
      color: var(--muted);
    }
    #accountSelect,
    #newAccount {
      padding: 0.35rem 0.6rem;
      border-radius: 9999px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      background: rgba(15, 23, 42, 0.3);
      color: var(--text);
    }
    #accountSelect:disabled {
      opacity: 0.6;
    }
    #accountMessage {
      font-size: 0.75rem;
      color: var(--muted);
      min-width: 12ch;
    }
    #opgg-panel {
      padding: 0.85rem 1.5rem;
      border-top: 1px solid rgba(148, 163, 184, 0.16);
      background: rgba(30, 41, 59, 0.48);
      display: grid;
      gap: 0.7rem;
    }
    .opgg-fields,
    .opgg-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }
    #opgg-panel label {
      font-size: 0.78rem;
      color: var(--muted);
    }
    #riotName,
    #riotTag,
    #opggRegion,
    #opggPaste {
      border: 1px solid rgba(148, 163, 184, 0.3);
      background: rgba(15, 23, 42, 0.45);
      color: var(--text);
      border-radius: 0.65rem;
      font: inherit;
    }
    #riotName,
    #riotTag,
    #opggRegion {
      padding: 0.35rem 0.6rem;
    }
    #riotName {
      min-width: 14rem;
    }
    #riotTag {
      width: 7rem;
    }
    #opggPaste {
      width: min(100%, 64rem);
      min-height: 4.5rem;
      padding: 0.6rem 0.7rem;
      resize: vertical;
    }
    #opggMessage {
      min-height: 1rem;
      font-size: 0.78rem;
      color: var(--muted);
    }
    main {
      padding: 1rem;
      flex: 1 1 auto;
    }
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 0.75rem;
    }
    .champ {
      background: var(--card);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 0.5rem;
      padding: 0.35rem;
      text-align: center;
      cursor: pointer;
      transition: transform 0.1s ease, border 0.1s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }
    .champ:hover {
      transform: translateY(-2px);
      border: 1px solid rgba(226, 232, 240, 0.4);
    }
    .champ img {
      width: 64px;
      height: 64px;
      border-radius: 0.35rem;
      object-fit: cover;
      background: #0f172a;
    }
    .champ span {
      font-size: 0.7rem;
      line-height: 1.1;
      word-break: break-word;
    }
    .checked {
      border: 1px solid rgba(34, 197, 94, 0.8);
      box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
      opacity: 0.7;
      position: relative;
    }
    .checked::after {
      content: "✓";
      position: absolute;
      top: 4px;
      right: 6px;
      background: var(--accent);
      color: #0f172a;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      font-size: 0.75rem;
      display: grid;
      place-items: center;
      font-weight: 700;
    }
    #loader {
      text-align: center;
      margin-top: 3rem;
      color: var(--muted);
    }
    #search {
      padding: 0.35rem 0.6rem;
      border-radius: 9999px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      background: rgba(15, 23, 42, 0.3);
      color: var(--text);
    }
    @media (max-width: 500px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }
      .title-group {
        width: 100%;
        justify-content: space-between;
      }
      #grid {
        grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      }
      #riotName,
      #riotTag,
      #opggRegion,
      #opggPaste {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-row">
      <div class="title-group">
        <button class="pill-button" type="button" data-back-button aria-label="Back">
          ← Back
        </button>
        <h1>LoL Win-Tracker</h1>
      </div>
      <div id="account-controls">
        <label for="accountSelect">Account</label>
        <select id="accountSelect" disabled></select>
        <input
          id="newAccount"
          type="text"
          placeholder="New username"
          aria-label="Create new account"
        />
        <button id="addAccount">Add</button>
        <div id="accountMessage" aria-live="polite"></div>
      </div>
    </div>
    <div class="header-row controls-row">
      <div id="controls">
        <input id="search" type="text" placeholder="Search champ..." disabled />
        <button id="clear" disabled>Clear all</button>
        <button id="sortCompleted" disabled aria-pressed="false">Completed first</button>
      </div>
      <div id="status">Loading champions…</div>
    </div>
    <section id="opgg-panel" aria-label="OP.GG Arena import">
      <div class="opgg-fields">
        <label for="riotName">Riot ID</label>
        <input id="riotName" type="text" placeholder="Game Name" autocomplete="off" />
        <input id="riotTag" type="text" placeholder="Tag" autocomplete="off" />
        <label for="opggRegion">Region</label>
        <select id="opggRegion">
          <option value="na">NA</option>
          <option value="euw">EUW</option>
          <option value="eune">EUNE</option>
          <option value="kr">KR</option>
          <option value="br">BR</option>
          <option value="lan">LAN</option>
          <option value="las">LAS</option>
          <option value="oce">OCE</option>
          <option value="tr">TR</option>
          <option value="ru">RU</option>
          <option value="jp">JP</option>
        </select>
        <button id="saveRiotId" type="button">Save Riot ID</button>
        <a id="openOpgg" class="pill-button" href="https://op.gg/" target="_blank" rel="noreferrer">Open OP.GG</a>
      </div>
      <textarea id="opggPaste" placeholder="Paste copied OP.GG Arena match history text here, then import. A profile URL alone cannot be imported."></textarea>
      <div class="opgg-actions">
        <button id="importOpgg" type="button" disabled>Import 1st-place Arena champs</button>
        <button id="clearOpggPaste" type="button">Clear paste</button>
        <div id="opggMessage" aria-live="polite"></div>
      </div>
    </section>
  </header>
  <main>
    <div id="loader">Fetching champions from Data Dragon…</div>
    <div id="grid" hidden></div>
  </main>

  <script>
    const backButton = document.querySelector('[data-back-button]');
    if (backButton) {
      backButton.addEventListener('click', () => {
        if (window.history.length <= 1) {
          window.location.href = 'index.html';
        } else {
          window.history.back();
        }
      });
    }

    // storage keys
    const LEGACY_STORAGE_KEY = "lol-champ-checklist-v1";
    const ACCOUNT_STORAGE_KEY = "lol-champ-accounts-v1";
    const ACTIVE_USER_KEY = "lol-champ-active-user";

    const statusEl = document.getElementById("status");
    const gridEl = document.getElementById("grid");
    const loaderEl = document.getElementById("loader");
    const clearBtn = document.getElementById("clear");
    const searchInput = document.getElementById("search");
    const sortCompletedBtn = document.getElementById("sortCompleted");
    const accountSelect = document.getElementById("accountSelect");
    const newAccountInput = document.getElementById("newAccount");
    const addAccountBtn = document.getElementById("addAccount");
    const accountMessageEl = document.getElementById("accountMessage");
    const riotNameInput = document.getElementById("riotName");
    const riotTagInput = document.getElementById("riotTag");
    const opggRegionSelect = document.getElementById("opggRegion");
    const saveRiotIdBtn = document.getElementById("saveRiotId");
    const openOpggLink = document.getElementById("openOpgg");
    const opggPasteInput = document.getElementById("opggPaste");
    const importOpggBtn = document.getElementById("importOpgg");
    const clearOpggPasteBtn = document.getElementById("clearOpggPaste");
    const opggMessageEl = document.getElementById("opggMessage");

    function safeParse(json, fallback) {
      try {
        const parsed = JSON.parse(json);
        return parsed ?? fallback;
      } catch {
        return fallback;
      }
    }

    let accounts = safeParse(localStorage.getItem(ACCOUNT_STORAGE_KEY), {});
    if (typeof accounts !== "object" || accounts === null || Array.isArray(accounts)) {
      accounts = {};
    }
    Object.keys(accounts).forEach((name) => {
      accounts[name] = normalizeAccount(accounts[name]);
    });
    let activeUser = localStorage.getItem(ACTIVE_USER_KEY) || null;
    let checked = new Set();
    let champsList = [];
    let filterText = "";
    let completedFirst = false;

    function setAccountMessage(message = "", isError = false) {
      accountMessageEl.textContent = message;
      accountMessageEl.style.color = isError ? "#f87171" : "var(--muted)";
    }

    function persistAccounts() {
      localStorage.setItem(ACCOUNT_STORAGE_KEY, JSON.stringify(accounts));
    }

    function normalizeAccount(account) {
      if (Array.isArray(account)) {
        return { checked: account, riotName: "", riotTag: "", opggRegion: "na" };
      }
      if (typeof account !== "object" || account === null) {
        return { checked: [], riotName: "", riotTag: "", opggRegion: "na" };
      }
      return {
        checked: Array.isArray(account.checked) ? account.checked : [],
        riotName: typeof account.riotName === "string" ? account.riotName : "",
        riotTag: typeof account.riotTag === "string" ? account.riotTag : "",
        opggRegion: typeof account.opggRegion === "string" ? account.opggRegion : "na",
        lastOpggImport: typeof account.lastOpggImport === "string" ? account.lastOpggImport : "",
      };
    }

    function ensureAccount(username) {
      accounts[username] = normalizeAccount(accounts[username]);
      persistAccounts();
    }

    function setOpggMessage(message = "", isError = false) {
      opggMessageEl.textContent = message;
      opggMessageEl.style.color = isError ? "#f87171" : "var(--muted)";
    }

    function buildOpggUrl(account = accounts[activeUser]) {
      const normalized = normalizeAccount(account);
      const gameName = normalized.riotName.trim();
      const tag = normalized.riotTag.trim().replace(/^#/, "");
      const region = (normalized.opggRegion || "na").toLowerCase();

      if (!gameName || !tag) {
        return "https://op.gg/";
      }

      return `https://op.gg/lol/summoners/${encodeURIComponent(region)}/${encodeURIComponent(`${gameName}-${tag}`)}`;
    }

    function syncOpggControls() {
      const account = normalizeAccount(accounts[activeUser]);
      riotNameInput.value = account.riotName;
      riotTagInput.value = account.riotTag;
      opggRegionSelect.value = account.opggRegion || "na";
      openOpggLink.href = buildOpggUrl(account);
    }

    function previewOpggLinkFromFields() {
      openOpggLink.href = buildOpggUrl({
        riotName: riotNameInput.value,
        riotTag: riotTagInput.value,
        opggRegion: opggRegionSelect.value,
      });
    }

    function saveRiotId() {
      ensureAccount(activeUser);
      accounts[activeUser].riotName = riotNameInput.value.trim();
      accounts[activeUser].riotTag = riotTagInput.value.trim().replace(/^#/, "");
      accounts[activeUser].opggRegion = opggRegionSelect.value;
      persistAccounts();
      syncOpggControls();
      setOpggMessage(
        accounts[activeUser].riotName && accounts[activeUser].riotTag
          ? `Saved OP.GG link for ${accounts[activeUser].riotName}#${accounts[activeUser].riotTag}.`
          : "Saved. Add both Riot ID fields to open your exact OP.GG profile."
      );
    }

    function populateAccountSelect() {
      accountSelect.innerHTML = "";
      Object.keys(accounts).forEach((name) => {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        accountSelect.appendChild(option);
      });
      accountSelect.disabled = accountSelect.options.length === 0;
      if (activeUser && accounts[activeUser]) {
        accountSelect.value = activeUser;
      }
    }

    function applyCheckedToGrid() {
      renderGrid();
    }

    function setActiveUser(username) {
      ensureAccount(username);
      activeUser = username;
      localStorage.setItem(ACTIVE_USER_KEY, activeUser);
      const saved = accounts[activeUser]?.checked || [];
      checked = new Set(saved);
      if (accountSelect.value !== activeUser) {
        accountSelect.value = activeUser;
      }
      applyCheckedToGrid();
      syncOpggControls();
      setAccountMessage(`Tracking wins for ${activeUser}.`);
    }

    if (!activeUser || !accounts[activeUser]) {
      const existingUsers = Object.keys(accounts);
      if (existingUsers.length === 0) {
        activeUser = "Default";
        accounts[activeUser] = { checked: [], riotName: "", riotTag: "", opggRegion: "na" };
        persistAccounts();
      } else {
        activeUser = existingUsers[0];
      }
      localStorage.setItem(ACTIVE_USER_KEY, activeUser);
    }

    // migrate legacy single-account data if present
    const legacyChecked = safeParse(localStorage.getItem(LEGACY_STORAGE_KEY), []);
    if (Array.isArray(legacyChecked) && legacyChecked.length > 0) {
      ensureAccount(activeUser);
      accounts[activeUser].checked = legacyChecked;
      persistAccounts();
    }
    localStorage.removeItem(LEGACY_STORAGE_KEY);

    checked = new Set(accounts[activeUser]?.checked || []);
    populateAccountSelect();
    syncOpggControls();
    setAccountMessage(`Tracking wins for ${activeUser}.`);

    accountSelect.addEventListener("change", () => {
      const selected = accountSelect.value;
      if (selected) {
        setActiveUser(selected);
      }
    });

    addAccountBtn.addEventListener("click", () => {
      const newName = newAccountInput.value.trim();
      if (!newName) {
        setAccountMessage("Enter a username to add.", true);
        return;
      }
      const exists = Object.keys(accounts).some(
        (name) => name.toLowerCase() === newName.toLowerCase()
      );
      if (exists) {
        setAccountMessage("That username already exists.", true);
        return;
      }
      accounts[newName] = { checked: [], riotName: "", riotTag: "", opggRegion: "na" };
      persistAccounts();
      populateAccountSelect();
      newAccountInput.value = "";
      setActiveUser(newName);
    });

    newAccountInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        addAccountBtn.click();
      }
    });

    saveRiotIdBtn.addEventListener("click", saveRiotId);
    riotNameInput.addEventListener("input", previewOpggLinkFromFields);
    riotTagInput.addEventListener("input", previewOpggLinkFromFields);
    opggRegionSelect.addEventListener("change", previewOpggLinkFromFields);
    opggPasteInput.addEventListener("input", () => {
      importOpggBtn.disabled = champsList.length === 0 || opggPasteInput.value.trim().length === 0;
    });
    importOpggBtn.addEventListener("click", importOpggArenaWins);
    clearOpggPasteBtn.addEventListener("click", () => {
      opggPasteInput.value = "";
      importOpggBtn.disabled = true;
      setOpggMessage("");
    });

    function setControlsEnabled(enabled) {
      clearBtn.disabled = !enabled;
      searchInput.disabled = !enabled;
      sortCompletedBtn.disabled = !enabled;
      importOpggBtn.disabled = !enabled || opggPasteInput.value.trim().length === 0;
    }

    function createPlaceholder(name) {
      const initial = name.charAt(0).toUpperCase() || "?";
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="${name}">\
        <defs>\
          <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">\
            <stop offset="0%" stop-color="#22c55e" />\
            <stop offset="100%" stop-color="#16a34a" />\
          </linearGradient>\
        </defs>\
        <rect width="64" height="64" rx="10" fill="url(#g)" />\
        <text x="50%" y="55%" font-size="32" fill="#0f172a" font-family="'Segoe UI', sans-serif" font-weight="700" text-anchor="middle">${initial}</text>\
      </svg>`;
      return `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`;
    }

    const EXTRA_CHAMPS = [
      {
        id: "Zaheen",
        name: "Zaheen",
        title: "",
        imgUrl: createPlaceholder("Zaheen"),
      },
    ];

    setControlsEnabled(false);
    statusEl.textContent = "Loading champions…";

    function saveChecked() {
      ensureAccount(activeUser);
      accounts[activeUser].checked = [...checked];
      persistAccounts();
      localStorage.setItem(ACTIVE_USER_KEY, activeUser);
      updateStatus(champsList.length);
    }

    function updateStatus(total) {
      const count = checked.size;
      let totalCount;
      if (typeof total === "number") {
        totalCount = total;
      } else if (champsList.length > 0) {
        totalCount = champsList.length;
      } else {
        totalCount = gridEl.children.length;
      }
      statusEl.textContent = `${count} / ${totalCount} marked`;
    }

    function renderGrid() {
      if (!Array.isArray(champsList) || champsList.length === 0) {
        return;
      }

      sortCompletedBtn.classList.toggle("active", completedFirst);
      sortCompletedBtn.setAttribute("aria-pressed", completedFirst ? "true" : "false");

      const query = filterText.trim().toLowerCase();
      const filtered = champsList.filter((champ) =>
        champ.name.toLowerCase().includes(query)
      );

      const toRender = completedFirst ? [...filtered] : filtered;
      if (completedFirst) {
        toRender.sort((a, b) => {
          const aChecked = checked.has(a.id);
          const bChecked = checked.has(b.id);
          if (aChecked === bChecked) {
            return a.name.localeCompare(b.name);
          }
          return aChecked ? -1 : 1;
        });
      }

      gridEl.innerHTML = "";

      toRender.forEach((champ) => {
        const div = document.createElement("div");
        div.className = "champ";
        div.dataset.champId = champ.id.toString();

        const img = document.createElement("img");
        img.src = champ.imgUrl;
        img.alt = champ.name;

        const span = document.createElement("span");
        span.textContent = champ.name;

        if (checked.has(champ.id)) {
          div.classList.add("checked");
        }

        div.appendChild(img);
        div.appendChild(span);

        div.addEventListener("click", () => {
          if (checked.has(champ.id)) {
            checked.delete(champ.id);
          } else {
            checked.add(champ.id);
          }
          saveChecked();
          renderGrid();
        });

        gridEl.appendChild(div);
      });

      updateStatus(champsList.length);
    }

    function normalizeMatchText(value) {
      return value
        .toLowerCase()
        .replace(/&/g, "and")
        .replace(/[^a-z0-9]+/g, "");
    }

    function championMatchers() {
      const aliases = new Map([
        ["Bel'Veth", ["belveth"]],
        ["Cho'Gath", ["chogath"]],
        ["Dr. Mundo", ["drmundo", "mundo"]],
        ["Kai'Sa", ["kaisa"]],
        ["Kha'Zix", ["khazix"]],
        ["Kog'Maw", ["kogmaw"]],
        ["LeBlanc", ["leblanc"]],
        ["Master Yi", ["masteryi"]],
        ["Miss Fortune", ["missfortune"]],
        ["Nunu & Willump", ["nunu", "nunuandwillump"]],
        ["Rek'Sai", ["reksai"]],
        ["Renata Glasc", ["renataglasc", "renata"]],
        ["Tahm Kench", ["tahmkench"]],
        ["Twisted Fate", ["twistedfate"]],
        ["Vel'Koz", ["velkoz"]],
        ["Xin Zhao", ["xinzhao"]],
      ]);

      return champsList
        .flatMap((champ) => {
          const values = new Set([
            normalizeMatchText(champ.name),
            normalizeMatchText(champ.id),
            ...(aliases.get(champ.name) || []),
          ]);
          return [...values].map((value) => ({ value, champ }));
        })
        .filter((entry) => entry.value)
        .sort((a, b) => b.value.length - a.value.length);
    }

    function splitMatchBlocks(text) {
      const normalized = text.replace(/\r/g, "");
      const blocks = normalized
        .split(/\n\s*\n|(?=\bArena\b)/i)
        .map((block) => block.trim())
        .filter(Boolean);

      if (blocks.length > 1) {
        return blocks;
      }

      const lines = normalized
        .split("\n")
        .map((line) => line.trim())
        .filter(Boolean);
      const grouped = [];
      for (let i = 0; i < lines.length; i += 8) {
        grouped.push(lines.slice(i, i + 8).join("\n"));
      }
      return grouped.length > 0 ? grouped : [normalized];
    }

    function isOnlyOpggUrl(text) {
      const withoutUrls = text
        .replace(/https?:\/\/(?:www\.)?op\.gg\/\S+/gi, "")
        .trim();
      return withoutUrls.length === 0 && /\bop\.gg\//i.test(text);
    }

    function blockHasFirstPlace(block) {
      const text = block.replace(/\u00a0/g, " ");
      if (/(?:#\s*1\b|\b1\s*st\b|\b1\s*place\b|\btop\s*1\b|\bplace(?:d|ment)?\s*[:#]?\s*1\b|\brank(?:ed|ing)?\s*[:#]?\s*1\b|\bfirst\s+place\b)/i.test(text)) {
        return true;
      }

      const lines = text
        .split("\n")
        .map((line) => line.trim())
        .filter(Boolean);

      return lines.some((line, index) => {
        if (!/^#?\s*1\s*$/.test(line)) {
          return false;
        }
        const nearby = lines.slice(Math.max(0, index - 2), index + 3).join(" ");
        return /\b(?:arena|place|placed|placement|rank|ranked|ranking|result|finish|finished)\b/i.test(nearby);
      });
    }

    function findChampionInBlock(block, matchers) {
      const normalizedBlock = normalizeMatchText(block);
      let best = null;

      matchers.forEach((entry) => {
        const index = normalizedBlock.indexOf(entry.value);
        if (index === -1) {
          return;
        }
        if (!best || index < best.index || (index === best.index && entry.value.length > best.value.length)) {
          best = { ...entry, index };
        }
      });

      return best?.champ || null;
    }

    function importOpggArenaWins() {
      const rawText = opggPasteInput.value.trim();
      if (!rawText) {
        setOpggMessage("Paste copied Arena match text first.", true);
        return;
      }
      if (isOnlyOpggUrl(rawText)) {
        setOpggMessage("That is only an OP.GG URL. Open it, copy the Arena match rows/text, then paste that here.", true);
        return;
      }
      if (!Array.isArray(champsList) || champsList.length === 0) {
        setOpggMessage("Champion data is still loading.", true);
        return;
      }

      saveRiotId();
      const matchers = championMatchers();
      const blocks = splitMatchBlocks(rawText);
      const imported = [];
      const pasteMentionsArena = /\barena\b/i.test(rawText);
      let firstPlaceBlocks = 0;
      let unmatchedFirstPlaceBlocks = 0;

      blocks.forEach((block) => {
        const mentionsArena = pasteMentionsArena || /\barena\b/i.test(block);
        if (!mentionsArena || !blockHasFirstPlace(block)) {
          return;
        }

        firstPlaceBlocks += 1;
        const champ = findChampionInBlock(block, matchers);
        if (!champ) {
          unmatchedFirstPlaceBlocks += 1;
          return;
        }
        if (!checked.has(champ.id)) {
          checked.add(champ.id);
          imported.push(champ.name);
        }
      });

      if (imported.length > 0) {
        accounts[activeUser].lastOpggImport = new Date().toISOString();
        saveChecked();
        renderGrid();
        setOpggMessage(`Marked ${imported.length}: ${imported.join(", ")}.`);
        return;
      }

      if (firstPlaceBlocks > 0 && unmatchedFirstPlaceBlocks === firstPlaceBlocks) {
        setOpggMessage("Found #1 Arena rows, but could not match their champion names. Copy a little more of each match row and try again.", true);
        return;
      }

      if (firstPlaceBlocks > 0) {
        setOpggMessage("Those #1 Arena champions are already marked.", true);
        return;
      }

      setOpggMessage("No #1 Arena match rows found in that paste.", true);
    }

    async function loadChamps() {
      try {
        // 1) get latest version
        const versionsRes = await fetch("https://ddragon.leagueoflegends.com/api/versions.json");
        const versions = await versionsRes.json();
        const latest = versions[0]; // newest patch

        // 2) get champion data
        const champsRes = await fetch(
          `https://ddragon.leagueoflegends.com/cdn/${latest}/data/en_US/champion.json`
        );
        const champsJson = await champsRes.json();
        const data = champsJson.data; // object keyed by champ id (Aatrox, Ahri, ...)
        const champs = Object.values(data)
          .map((champ) => ({
            ...champ,
            imgUrl: `https://ddragon.leagueoflegends.com/cdn/${latest}/img/champion/${champ.image.full}`,
          }))
          .sort((a, b) => a.name.localeCompare(b.name));

        EXTRA_CHAMPS.forEach((extra) => {
          const exists = champs.some(
            (champ) => champ.id.toLowerCase() === extra.id.toLowerCase()
          );
          if (!exists) {
            champs.push(extra);
          }
        });

        champs.sort((a, b) => a.name.localeCompare(b.name));

        champsList = champs;
        renderGrid();

        loaderEl.hidden = true;
        gridEl.hidden = false;
        setControlsEnabled(true);
        updateStatus(champs.length);

        // hook up search
        searchInput.addEventListener("input", () => {
          filterText = searchInput.value;
          renderGrid();
        });

        // clear button
        clearBtn.addEventListener("click", () => {
          checked.clear();
          saveChecked();
          renderGrid();
        });

        sortCompletedBtn.addEventListener("click", () => {
          completedFirst = !completedFirst;
          renderGrid();
        });
      } catch (err) {
        loaderEl.textContent = "Failed to load champions 😢";
        statusEl.textContent = "Unable to load champions.";
        console.error(err);
        throw err;
      }
    }

    (async () => {
      loaderEl.hidden = false;
      loaderEl.textContent = "Fetching champions from Data Dragon…";
      try {
        await loadChamps();
      } catch (error) {
        // already handled in loadChamps
      }
    })();
  </script>
    <script src="site-navigation.js"></script>
</body>
