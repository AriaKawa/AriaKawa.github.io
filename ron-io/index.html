<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ron.io</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <canvas id="arena" aria-label="Ron.io neon light-cycle arena"></canvas>

    <section class="stats" aria-label="Run stats">
      <div><strong id="score">0</strong><span>score</span></div>
      <div><strong id="length">36</strong><span>laser</span></div>
      <div><strong id="kos">0</strong><span>KOs</span></div>
      <div><strong id="best">0</strong><span>best</span></div>
      <div class="ult">
        <div><span>Hop</span><strong id="hopLabel">0%</strong></div>
        <i><b id="hopFill"></b></i>
      </div>
    </section>

    <aside class="leaderboard" aria-label="Leaderboard">
      <h2>Leaderboard</h2>
      <ol id="leaderboard"></ol>
    </aside>

    <canvas id="minimap" class="minimap" aria-label="Ron.io minimap"></canvas>

    <nav class="dpad" aria-label="Touch movement controls">
      <button type="button" data-dir="up" aria-label="Turn up">▲</button>
      <button type="button" data-dir="left" aria-label="Turn left">◀</button>
      <button type="button" data-dir="right" aria-label="Turn right">▶</button>
      <button type="button" data-dir="down" aria-label="Turn down">▼</button>
    </nav>

    <section id="menu" class="menu">
      <p class="eyebrow">Ron.io</p>
      <h1>Race the dark lanes.</h1>
      <p>Move with arrows or WASD. The map is huge, side gates wrap like a maze, tunnels spit you elsewhere, and Space spends a charged Hop to clear one laser line.</p>
      <button id="start" type="button">Enter The Circuit</button>
    </section>

    <script src="game.js"></script>
    <script src="../site-navigation.js"></script>
  </body>
</html>
