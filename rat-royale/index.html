<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rat Royale Casino</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <a class="back-link" href="../games.html" aria-label="Back to games">Back</a>
        <div class="brand-lockup">
          <span>Private table</span>
          <h1>Rat Royale Casino</h1>
        </div>
        <div class="room-pill" id="roomPill">No room</div>
      </header>

      <section class="entry-panel" id="entryPanel">
        <div class="entry-copy">
          <p>Pick a rat. Gamble twice. Shop. Fight. Three cycles.</p>
        </div>
        <div class="entry-actions">
          <label class="field">
            <span>Name</span>
            <input id="nameInput" type="text" maxlength="18" autocomplete="nickname" placeholder="Aria">
          </label>
          <label class="field code-field">
            <span>Code</span>
            <input id="roomCodeInput" type="text" maxlength="6" autocomplete="off" placeholder="ROOM">
          </label>
          <div class="button-row">
            <button class="primary" type="button" data-action="create-room">New Room</button>
            <button class="secondary" type="button" data-action="join-room">Join</button>
          </div>
        </div>
      </section>

      <section class="game-shell" id="gameShell" hidden>
        <aside class="player-dock" id="playerDock" aria-label="Players"></aside>

        <section class="main-stage">
          <div class="phase-strip">
            <div>
              <span id="phaseKicker">Lobby</span>
              <strong id="phaseTitle">Choose your rat</strong>
            </div>
            <div class="phase-meta" id="phaseMeta">Cycle 1 / 3</div>
          </div>

          <div class="phase-view" id="phaseView"></div>
        </section>

        <aside class="rat-panel">
          <div class="rat-focus" id="myRatFocus"></div>
          <div class="stat-bubbles" id="myStats"></div>
          <div class="host-actions" id="hostActions"></div>
        </aside>
      </section>

      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </main>

    <script type="module" src="app.js"></script>
    <script src="../site-navigation.js"></script>
  </body>
</html>
