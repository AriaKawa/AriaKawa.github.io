<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Market Scout</title>
    <link rel="stylesheet" href="styles.css?v=20260521-simple" />
  </head>
  <body>
    <main class="app-shell">
      <a class="back-link" href="../other.html">Back</a>

      <section class="search-panel" aria-labelledby="pageTitle">
        <p class="eyebrow">Marketplace search</p>
        <h1 id="pageTitle">Market Scout</h1>

        <form id="searchForm" class="search-form">
          <label>
            What do you want to search for?
            <input id="queryInput" name="query" type="text" autocomplete="off" placeholder="SSD" autofocus />
          </label>

          <label>
            Where are you looking?
            <input id="locationInput" name="location" type="text" autocomplete="address-level2" placeholder="Troy, MO" />
          </label>

          <a class="primary-action" id="facebookLink" target="_blank" rel="noreferrer">
            Search Facebook Marketplace
          </a>
        </form>

        <p class="status" id="searchStatus">Type an item and city to start.</p>
      </section>

      <details class="advanced-panel">
        <summary>More options</summary>
        <div class="advanced-grid">
          <label>
            Radius
            <select id="radiusInput">
              <option value="5">5 miles</option>
              <option value="10">10 miles</option>
              <option value="25" selected>25 miles</option>
              <option value="50">50 miles</option>
              <option value="100">100 miles</option>
              <option value="250">250 miles</option>
            </select>
          </label>

          <label>
            Max price
            <input id="maxPriceInput" type="number" min="0" step="5" placeholder="Optional" />
          </label>
        </div>

        <div class="term-box">
          <div>
            <span class="section-label">Auto keywords</span>
            <div class="terms" id="termStrip"></div>
          </div>
          <button class="quiet-button" id="copyTermsBtn" type="button">Copy terms</button>
        </div>

        <div class="link-grid">
          <a class="secondary-action" id="ebayLink" target="_blank" rel="noreferrer">Search eBay</a>
          <a class="secondary-action" id="soldLink" target="_blank" rel="noreferrer">eBay sold comps</a>
        </div>

        <p class="note">
          Facebook uses your Marketplace account location. The city field is saved here so the search is clear, and eBay searches use your item terms.
        </p>
      </details>
    </main>

    <script src="app.js?v=20260521-simple"></script>
  </body>
</html>
